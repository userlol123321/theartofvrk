<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Details | THE ART OF VRK</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --accent-lime: #DFFF00; 
            --accent-purple: #661bad;
            --text-gray: #a0a0a0;
            --glass: rgba(255, 255, 255, 0.03);
            --nav-height: 100px;
        }

        /* --- CORE --- */
        * { cursor: crosshair; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        
        body {
            margin: 0; padding: 0; background-color: var(--bg-dark); color: #fff;
            font-family: 'JetBrains Mono', monospace; overflow-x: hidden;
            perspective: 1200px; width: 100vw; min-height: 100vh;
            display: flex; flex-direction: column;
        }

        /* --- HEADER --- */
        nav {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--nav-height);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; background: rgba(5, 5, 5, 0.9); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 10000; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .brand-box { display: flex; align-items: center; gap: 20px; }
        .nav-logo-box { width: 50px; height: 50px; }
        .rotating-nav-logo {
            width: 100%; height: 100%;
            background: url('https://i.postimg.cc/y8HbKgWs/Untitled128-20230902013741.png') no-repeat center;
            background-size: contain; animation: rotateY 10s infinite linear;
            filter: drop-shadow(0 0 5px var(--accent-lime));
        }
        @keyframes rotateY { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
        
        .nav-links a { 
            color: #fff; text-decoration: none; margin-left: 30px; 
            font-size: 11px; letter-spacing: 2px; transition: 0.3s;
        }
        .nav-links a:hover { color: var(--accent-lime); text-shadow: 0 0 8px var(--accent-lime); }

        /* --- MAIN LAYOUT --- */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 140px 5% 60px 5%; /* Top padding accounts for 100px header */
        }

        .product-3d-wrap {
            perspective: 1500px;
            width: 100%;
            max-width: 1100px;
        }

        .product-container {
            display: flex;
            gap: 50px;
            background: var(--glass);
            border: 1px solid #1a1a1a;
            padding: 50px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .image-display {
            flex: 1;
            border: 1px solid #222;
            background: #000;
            padding: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateZ(30px); /* Lifts image off the card */
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .image-display img {
            max-width: 100%;
            height: auto;
            filter: drop-shadow(0 0 15px rgba(223, 255, 0, 0.1));
        }

        .details-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transform: translateZ(50px); /* Lifts text even higher */
        }

        .status-tag {
            font-size: 10px; color: var(--accent-lime);
            border: 1px solid var(--accent-lime);
            padding: 5px 12px; margin-bottom: 20px;
            width: fit-content; letter-spacing: 2px;
        }

        h1 {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(1.5rem, 4vw, 3rem);
            margin: 0 0 15px 0; line-height: 1;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .price-tag {
            font-size: 1.8rem; color: var(--accent-lime);
            margin-bottom: 25px; font-weight: bold;
        }

        .description {
            color: var(--text-gray); font-size: 0.95rem;
            line-height: 1.8; margin-bottom: 40px;
            border-left: 3px solid var(--accent-purple);
            padding-left: 20px;
        }

        .acquire-btn {
            background: var(--accent-lime); color: #000;
            text-decoration: none; padding: 20px 40px;
            font-weight: bold; text-align: center;
            letter-spacing: 3px; transition: 0.4s;
            border: 1px solid var(--accent-lime);
            font-size: 12px;
        }

        .acquire-btn:hover {
            background: transparent; color: var(--accent-lime);
            box-shadow: 0 0 30px var(--accent-lime);
            transform: translateZ(20px);
        }

        .back-btn {
            position: absolute; top: -50px; left: 0;
            color: var(--text-gray); text-decoration: none;
            font-size: 10px; letter-spacing: 2px;
            transition: 0.3s;
        }
        .back-btn:hover { color: var(--accent-lime); }

        footer { padding: 60px; text-align: center; border-top: 1px solid #111; color: #444; font-size: 10px; }

        @media (max-width: 850px) {
            .product-container { flex-direction: column; padding: 30px; }
            main { padding-top: 120px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="brand-box">
        <div class="nav-logo-box"><div class="rotating-nav-logo"></div></div>
        <div style="font-size: 10px; letter-spacing: 3px; color: var(--accent-lime); font-weight: 500;">THE ART OF VRK // ARCHIVE</div>
    </div>
    <div class="nav-links">
        <a href="index.html#store">STORE</a>
        <a href="index.html#portfolio">VAULT</a>
        <a href="index.html#identity">IDENTITY</a>
    </div>
</nav>

<main>
    <div class="product-3d-wrap">
        <div class="product-container" id="tilt-card">
            <a href="index.html" class="back-btn">< RETURN_TO_DATABASE</a>
            
            <div class="image-display">
                <img id="product-img" src="" alt="Asset Image">
            </div>

            <div class="details-panel">
                <div class="status-tag">STATUS: AVAILABLE // ID: 0X_VRK</div>
                <h1 id="product-title">LOADING...</h1>
                <div class="price-tag" id="product-price">₹--</div>
                <div class="description" id="product-desc">
                    Initializing secure connection to VRK vault...
                </div>
                <a href="#" id="buy-link" class="acquire-btn">ACQUIRE_ASSET_DIRECT</a>
            </div>
        </div>
    </div>
</main>

<footer>
    &copy; 2026 VIKRANT R. KALE // ARCHIVE_V4.9.6 // PRODUCT_3D_DETAILED
</footer>

<script>
    // --- DATA LOADING ---
    const params = new URLSearchParams(window.location.search);
    const title = params.get('title');
    const price = params.get('price');
    const img = params.get('img');
    const desc = params.get('desc');
    const pay = params.get('pay');

    if (title) {
        document.title = `${title} | VRK ARCHIVE`;
        document.getElementById('product-title').innerText = title.toUpperCase();
        document.getElementById('product-price').innerText = `₹${price}`;
        document.getElementById('product-img').src = img;
        document.getElementById('product-desc').innerText = desc.replace(/"/g, '');
        document.getElementById('buy-link').href = pay;
    }

    // --- 3D TILT EFFECT ---
    const card = document.getElementById('tilt-card');
    document.addEventListener('mousemove', (e) => {
        let xAxis = (window.innerWidth / 2 - e.pageX) / 40;
        let yAxis = (window.innerHeight / 2 - e.pageY) / 40;
        card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });

    // Reset tilt on mouse out
    document.addEventListener('mouseleave', () => {
        card.style.transform = `rotateY(0deg) rotateX(0deg)`;
    });
</script>

</body>
</html>
