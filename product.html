<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Details | THE ART OF VRK</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --accent-lime: #DFFF00; 
            --accent-purple: #661bad;
            --text-gray: #a0a0a0;
        }

        * { cursor: crosshair; box-sizing: border-box; }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Scanline Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 2000;
        }

        .product-container {
            display: flex;
            max-width: 1000px;
            width: 100%;
            gap: 50px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid #222;
            padding: 40px;
            position: relative;
        }

        .image-display {
            flex: 1;
            border: 1px solid #333;
            background: #000;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-display img {
            max-width: 100%;
            height: auto;
            filter: drop-shadow(0 0 15px rgba(223, 255, 0, 0.1));
        }

        .details-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .status-tag {
            font-size: 10px;
            color: var(--accent-lime);
            border: 1px solid var(--accent-lime);
            padding: 5px 10px;
            display: inline-block;
            margin-bottom: 20px;
            width: fit-content;
        }

        h1 {
            font-family: 'Archivo Black', sans-serif;
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            color: #fff;
            text-transform: uppercase;
        }

        .price-tag {
            font-size: 1.5rem;
            color: var(--accent-lime);
            margin-bottom: 20px;
            font-weight: bold;
        }

        .description {
            color: var(--text-gray);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 30px;
            border-left: 2px solid var(--accent-purple);
            padding-left: 20px;
        }

        .acquire-btn {
            background: var(--accent-lime);
            color: #000;
            text-decoration: none;
            padding: 15px 30px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 2px;
            transition: 0.3s;
            border: 1px solid var(--accent-lime);
        }

        .acquire-btn:hover {
            background: transparent;
            color: var(--accent-lime);
            box-shadow: 0 0 20px rgba(223, 255, 0, 0.3);
        }

        .back-link {
            position: absolute;
            top: -40px;
            left: 0;
            color: #555;
            text-decoration: none;
            font-size: 10px;
            letter-spacing: 2px;
        }

        .back-link:hover { color: #fff; }

        @media (max-width: 768px) {
            .product-container { flex-direction: column; padding: 20px; }
            .back-link { top: -30px; }
        }
    </style>
</head>
<body>

    <div class="product-container">
        <a href="index.html" class="back-link">< RETURN TO ARCHIVE</a>
        
        <div class="image-display">
            <img id="product-img" src="" alt="Asset Image">
        </div>

        <div class="details-panel">
            <div class="status-tag">ASSET_ID: //ENCRYPTED//</div>
            <h1 id="product-title">LOADING...</h1>
            <div class="price-tag" id="product-price">₹--</div>
            <div class="description" id="product-desc">
                Establishing neural link to cloud data...
            </div>
            <a href="#" id="buy-link" class="acquire-btn">ACQUIRE ASSET</a>
        </div>
    </div>

    <script>
        // Logic to grab data from the URL
        const params = new URLSearchParams(window.location.search);
        
        const title = params.get('title');
        const price = params.get('price');
        const img = params.get('img');
        const desc = params.get('desc');
        const pay = params.get('pay');

        if (title) {
            document.title = `${title} | VRK ARCHIVE`;
            document.getElementById('product-title').innerText = title.toUpperCase();
            document.getElementById('product-price').innerText = `₹${price}`;
            document.getElementById('product-img').src = img;
            document.getElementById('product-desc').innerText = desc.replace(/"/g, '');
            document.getElementById('buy-link').href = pay;
        }
    </script>
</body>
</html>
